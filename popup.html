<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 260px;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #0f0f0f;
        color: #f1f1f1;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .header h1 {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .logo {
        width: 28px;
        height: 28px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 0;
        border-top: 1px solid #272727;
      }

      .toggle-label {
        font-size: 13px;
        color: #aaa;
      }

      /* Toggle switch */
      .switch {
        position: relative;
        width: 44px;
        height: 24px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #383838;
        border-radius: 24px;
        transition: background 0.2s;
      }

      .slider::before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background: #f1f1f1;
        border-radius: 50%;
        transition: transform 0.2s;
      }

      input:checked + .slider {
        background: #c33;
      }

      input:checked + .slider::before {
        transform: translateX(20px);
      }

      .status {
        margin-top: 12px;
        font-size: 12px;
        color: #666;
        text-align: center;
      }

      .status.active {
        color: #c33;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="icons/icon48.svg" alt="ByeByeShorts" class="logo" />
      <h1>ByeByeShorts</h1>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Hide Shorts</span>
      <label class="switch">
        <input type="checkbox" id="toggle" checked />
        <span class="slider"></span>
      </label>
    </div>

    <div class="status active" id="status">Shorts are hidden</div>

    <script src="popup.js"></script>
  </body>
</html>
